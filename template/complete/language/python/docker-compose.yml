
services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: python-postgres
    env_file: .env
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER} -d ${DATABASE_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache & Queue
  redis:
    image: redis:7-alpine
    container_name: python-redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    env_file: .env
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--auth", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Python Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: python-app
    env_file: .env
    environment:
      DATABASE_HOST: postgres
      REDIS_HOST: redis
    ports:
      - "${PORT}:${PORT}"
      - "${METRICS_PORT}:${METRICS_PORT}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app:ro  # Read-only app mount for development
      - static_files:/app/static
      - media_files:/app/media
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # Celery Worker (optional - for async tasks)
  celery:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: python-celery
    command: celery -A app worker -l info
    env_file: .env
    environment:
      DATABASE_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      - postgres
      - redis
      - app
    volumes:
      - ./app:/app:ro
    restart: unless-stopped

  # Celery Beat (optional - for scheduled tasks)
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: python-celery-beat
    command: celery -A app beat -l info
    env_file: .env
    environment:
      DATABASE_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      - postgres
      - redis
      - celery
    volumes:
      - ./app:/app:ro
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: python-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - static_files:/usr/share/nginx/html/static:ro
      - media_files:/usr/share/nginx/html/media:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  static_files:
    driver: local
  media_files:
    driver: local

networks:
  default:
    name: python-network
    driver: bridge