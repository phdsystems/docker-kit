name: Docker Lint and Security

on:
  push:
    branches: [ main, develop, feature/* ]
    paths:
      - 'Dockerfile*'
      - '.dockerignore*'
      - 'build-targets/Dockerfile*'
      - '.github/workflows/docker-lint.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'Dockerfile*'
      - '.dockerignore*'
      - 'build-targets/Dockerfile*'

jobs:
  hadolint:
    name: Hadolint Dockerfile Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Hadolint on main Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: warning
          ignore: DL3008,DL3009  # Ignore pinning warnings if needed

      - name: Run Hadolint on multistage Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile.multistage
          failure-threshold: warning
          ignore: DL3008,DL3009
        continue-on-error: true

      - name: Run Hadolint on build targets
        run: |
          for dockerfile in build-targets/Dockerfile*; do
            if [ -f "$dockerfile" ]; then
              echo "Linting $dockerfile..."
              docker run --rm -i hadolint/hadolint < "$dockerfile" || true
            fi
          done

  docker-scout:
    name: Docker Scout Security Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          tags: dck:ci-test
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Docker Scout CVEs
        uses: docker/scout-action@v1
        with:
          command: cves
          image: dck:ci-test
          only-severities: critical,high
          exit-code: false  # Don't fail the build, just report

      - name: Docker Scout Recommendations
        uses: docker/scout-action@v1
        with:
          command: recommendations
          image: dck:ci-test
        continue-on-error: true

  trivy:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.multistage
          tags: dck:trivy-test
          load: true

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: dck:trivy-test
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
        if: always()

  dockerfile-best-practices:
    name: Dockerfile Best Practices Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for HEALTHCHECK
        run: |
          echo "Checking for HEALTHCHECK directive..."
          for dockerfile in Dockerfile*; do
            if [ -f "$dockerfile" ]; then
              if grep -q "HEALTHCHECK" "$dockerfile"; then
                echo "✅ $dockerfile has HEALTHCHECK"
              else
                echo "⚠️  $dockerfile missing HEALTHCHECK"
              fi
            fi
          done

      - name: Check for USER directive
        run: |
          echo "Checking for non-root USER..."
          for dockerfile in Dockerfile*; do
            if [ -f "$dockerfile" ]; then
              if grep -q "^USER " "$dockerfile"; then
                echo "✅ $dockerfile sets USER"
              else
                echo "❌ $dockerfile missing USER directive"
                exit 1
              fi
            fi
          done

      - name: Check for pinned versions
        run: |
          echo "Checking for pinned base image versions..."
          for dockerfile in Dockerfile*; do
            if [ -f "$dockerfile" ]; then
              if grep -E "^FROM .+:[0-9]+\." "$dockerfile"; then
                echo "✅ $dockerfile uses pinned base image"
              else
                echo "⚠️  $dockerfile should pin base image version"
              fi
            fi
          done

      - name: Check .dockerignore
        run: |
          if [ -f .dockerignore ]; then
            echo "✅ .dockerignore exists"
            # Check for important patterns
            for pattern in ".git" ".env" "*.log" "node_modules"; do
              if grep -q "$pattern" .dockerignore; then
                echo "  ✅ Contains $pattern"
              else
                echo "  ⚠️  Missing $pattern"
              fi
            done
          else
            echo "❌ .dockerignore missing"
            exit 1
          fi

  image-size-check:
    name: Image Size Analysis
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and analyze image size
        run: |
          # Build the image
          docker build -f Dockerfile.multistage -t dck:size-test .
          
          # Get image size
          SIZE=$(docker images dck:size-test --format "{{.Size}}")
          echo "Image size: $SIZE"
          
          # Check if size is reasonable (under 100MB for Alpine-based image)
          SIZE_MB=$(docker images dck:size-test --format "{{.Size}}" | sed 's/MB//')
          if [ "${SIZE_MB%.*}" -gt 100 ]; then
            echo "⚠️  Warning: Image size exceeds 100MB"
          else
            echo "✅ Image size is reasonable"
          fi
          
          # Use dive for detailed analysis (if available)
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            wagoodman/dive:latest dck:size-test || true