repos:
  - repo: local
    hooks:
      - id: single-branch-check
        name: Single Branch Check
        entry: bash -c 'if [ $(git branch | wc -l) -gt 1 ]; then echo "❌ Multiple local branches detected. Clean up with: git branch | grep -v \"^\*\" | xargs git branch -D"; exit 1; fi'
        language: system
        pass_filenames: false
        always_run: true