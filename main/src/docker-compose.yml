services:
  dockerkit:
    build:
      context: .
      dockerfile: Dockerfile
    image: dockerkit:latest
    container_name: dockerkit
    hostname: dockerkit
    privileged: true
    stdin_open: true
    tty: true
    environment:
      - DOCKER_HOST=${DOCKER_HOST:-unix:///var/run/docker.sock}
      - DOCKERKIT_LOG_LEVEL=${DOCKERKIT_LOG_LEVEL:-info}
      - DOCKERKIT_DATA_DIR=/var/lib/dockerkit/data
      - DOCKERKIT_LOG_DIR=/var/lib/dockerkit/logs
    volumes:
      # Docker socket for Docker-in-Docker
      - /var/run/docker.sock:/var/run/docker.sock:rw
      # Persistent data
      - dockerkit_data:/var/lib/dockerkit/data
      - dockerkit_logs:/var/lib/dockerkit/logs
      # Optional: Mount local development files
      - ./scripts:/opt/dockerkit/scripts:ro
      - ./docs:/opt/dockerkit/docs:ro
    networks:
      - dockerkit_net
    restart: unless-stopped
    labels:
      - "com.dockerkit.version=1.0.0"
      - "com.dockerkit.description=Docker Management Toolkit"

  # Optional: DockerKit API service
  dockerkit-api:
    build:
      context: .
      dockerfile: Dockerfile.api
      args:
        - API_PORT=${API_PORT:-8080}
    image: dockerkit-api:latest
    container_name: dockerkit-api
    profiles: ["api"]
    environment:
      - API_PORT=${API_PORT:-8080}
      - API_HOST=${API_HOST:-0.0.0.0}
      - DOCKER_HOST=unix:///var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "${API_PORT:-8080}:8080"
    networks:
      - dockerkit_net
    depends_on:
      - dockerkit
    restart: unless-stopped

  # Optional: DockerKit Web UI
  dockerkit-ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    image: dockerkit-ui:latest
    container_name: dockerkit-ui
    profiles: ["ui"]
    environment:
      - UI_PORT=${UI_PORT:-3000}
      - API_URL=http://dockerkit-api:8080
    ports:
      - "${UI_PORT:-3000}:3000"
    networks:
      - dockerkit_net
    depends_on:
      - dockerkit-api
    restart: unless-stopped

volumes:
  dockerkit_data:
    name: dockerkit_data
    labels:
      - "com.dockerkit.volume=data"
  dockerkit_logs:
    name: dockerkit_logs
    labels:
      - "com.dockerkit.volume=logs"

networks:
  dockerkit_net:
    name: dockerkit_network
    driver: bridge
    labels:
      - "com.dockerkit.network=main"