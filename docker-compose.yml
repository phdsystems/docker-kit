services:
  dockerkit:
    build:
      context: .
      dockerfile: build-targets/Dockerfile.dockerkit
      args:
        - INSTALL_API=${INSTALL_API:-false}
        - INSTALL_UI=${INSTALL_UI:-false}
        - INSTALL_MONITORING=${INSTALL_MONITORING:-false}
        - INSTALL_BACKUP_TOOLS=${INSTALL_BACKUP_TOOLS:-false}
    image: dockerkit:latest
    container_name: dockerkit
    hostname: dockerkit
    user: "1000:1000"
    privileged: true
    stdin_open: true
    tty: true
    environment:
      - DOCKER_HOST=${DOCKER_HOST:-unix:///var/run/docker.sock}
      - DOCKERKIT_LOG_LEVEL=${DOCKERKIT_LOG_LEVEL:-info}
      - DOCKERKIT_DATA_DIR=/var/lib/dockerkit/data
      - DOCKERKIT_LOG_DIR=/var/lib/dockerkit/logs
    volumes:
      # Docker socket for Docker operations
      - /var/run/docker.sock:/var/run/docker.sock:rw
      # Persistent data
      - dockerkit_data:/var/lib/dockerkit/data
      - dockerkit_logs:/var/lib/dockerkit/logs
      # Optional: Mount local development files
      - ./src/scripts:/opt/dockerkit/scripts:ro
      - ./docs:/opt/dockerkit/docs:ro
    networks:
      - dockerkit_net
    restart: unless-stopped
    labels:
      - "com.dockerkit.version=1.0.0"
      - "com.dockerkit.description=Docker Management Toolkit"

  # Optional: DockerKit API service
  dockerkit-api:
    build:
      context: .
      dockerfile: build-targets/Dockerfile.dockerkit
      args:
        - INSTALL_API=true
    image: dockerkit:api
    container_name: dockerkit-api
    user: "1000:1000"
    profiles: ["api"]
    environment:
      - API_PORT=${API_PORT:-8080}
      - API_HOST=${API_HOST:-0.0.0.0}
      - DOCKER_HOST=unix:///var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - dockerkit_data:/var/lib/dockerkit/data:ro
    ports:
      - "${API_PORT:-8080}:8080"
    networks:
      - dockerkit_net
    depends_on:
      - dockerkit
    restart: unless-stopped
    command: ["dockerkit", "api", "serve"]

  # Optional: DockerKit Web UI
  dockerkit-ui:
    build:
      context: .
      dockerfile: build-targets/Dockerfile.dockerkit
      args:
        - INSTALL_UI=true
    image: dockerkit:ui
    container_name: dockerkit-ui
    user: "1000:1000"
    profiles: ["ui"]
    environment:
      - UI_PORT=${UI_PORT:-3000}
      - API_URL=http://dockerkit-api:8080
    ports:
      - "${UI_PORT:-3000}:3000"
    networks:
      - dockerkit_net
    depends_on:
      - dockerkit-api
    restart: unless-stopped
    command: ["dockerkit", "ui", "serve"]

volumes:
  dockerkit_data:
    name: dockerkit_data
    labels:
      - "com.dockerkit.volume=data"
  dockerkit_logs:
    name: dockerkit_logs
    labels:
      - "com.dockerkit.volume=logs"

networks:
  dockerkit_net:
    name: dockerkit_network
    driver: bridge
    labels:
      - "com.dockerkit.network=main"